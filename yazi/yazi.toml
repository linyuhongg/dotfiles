[opener]
edit = [
    { run = 'nvim "$@"', block = true, for = "unix" },
]

[open]
rules = [
    { mime = "text/*", use = "edit" },
    { name = "*.md", use = "edit" },
    { name = "*.toml", use = "edit" },
    { name = "*.yaml", use = "edit" },
    { name = "*.yml", use = "edit" },
    { name = "*.json", use = "edit" },
    { name = "*.py", use = "edit" },
    { name = "*.sh", use = "edit" },
    { name = "*.lua", use = "edit" },
]
